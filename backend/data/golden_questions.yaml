# Golden retrieval-eval set. Each question lists glob-ish patterns that should
# match the SOURCE FILE of a correctly-retrieved chunk (matched against the
# normalized rst basename, e.g. "4-3-conditional-probability").
#
# STARTER SET (~26) — grow this to 60-100 with real student phrasings; several
# per chapter plus syllabus/exam/resource types. Run with:
#   python backend/scripts/eval.py run
version: "2026-07-11-seed"
