    <script>
      // Theme boot: set data-theme before first paint to avoid a flash.
      // Reads the zustand-persist blob written by settingsStore ("stat350.settings").
      (function () {
        var theme = "system";
        try {
          var raw = localStorage.getItem("stat350.settings");
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.theme) theme = parsed.state.theme;
          }
        } catch (e) {
          /* corrupted storage -> fall through to system */
        }
        var resolved =
          theme === "system"
            ? window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : theme;
        document.documentElement.setAttribute("data-theme", resolved);
      })();
    </script>
